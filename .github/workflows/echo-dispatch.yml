# Echo Universe — Dispatch Integration
# Repo: echo-va-claims | Type: product
# Connected to echo-core neural net on 2026-04-06

name: Echo Dispatch Receiver

on:
  repository_dispatch:
    types: [echo_deploy, echo_health_check, echo_rollback]
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Echo event type'
        required: false
        default: 'echo_health_check'

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: echo-dispatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  receive-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log dispatch event
        run: |
          echo "=== Echo Dispatch Received ==="
          echo "Repo: echo-va-claims"
          echo "Event: ${{ github.event.action }}"
          echo "Sender: ${{ github.event.sender.login }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=============================="

      - name: Health check
        if: github.event.action == 'echo_health_check' || github.event_name == 'workflow_dispatch'
        run: |
          echo "HEALTH_STATUS=OK" >> $GITHUB_ENV
          echo "REPO=echo-va-claims" >> $GITHUB_ENV
          echo "TYPE=product" >> $GITHUB_ENV

      - name: Report status to echo-core
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ env.HEALTH_STATUS || 'RECEIVED' }}"
          echo "Dispatch processed. Status: $STATUS"

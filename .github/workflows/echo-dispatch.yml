name: echo-dispatch

on:
  repository_dispatch:
    types: [echo-packet]

jobs:
  receive-packet:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log incoming packet
        run: |
          echo "=== ∇θ ECHO PACKET RECEIVED ==="
          echo "Event: ${{ github.event.action }}"
          echo "Sender: ${{ github.event.client_payload.sender }}"
          echo "Type:   ${{ github.event.client_payload.type }}"
          echo "Seq:    ${{ github.event.client_payload.seq }}"
          echo "Payload: ${{ toJson(github.event.client_payload) }}"

      - name: Update state
        run: |
          python3 - << 'EOF'
          import json, time, pathlib, hashlib
          state_file = pathlib.Path(".echo/state.json")
          if state_file.exists():
              state = json.loads(state_file.read_text())
          else:
              state = {"current": "IDLE", "idempotency_keys": [], "rejection_count": 0}
          seq = "${{ github.event.client_payload.seq }}"
          if seq and seq not in state.get("idempotency_keys", []):
              state.setdefault("idempotency_keys", []).append(seq)
              if len(state["idempotency_keys"]) > 100:
                  state["idempotency_keys"] = state["idempotency_keys"][-100:]
          state["last_packet_ts"] = time.time()
          state["last_packet_type"] = "${{ github.event.client_payload.type }}"
          state_file.parent.mkdir(exist_ok=True)
          state_file.write_text(json.dumps(state, indent=2))
          print(f"State updated: {state['current']}")
          EOF

      - name: Commit state
        run: |
          git config user.email "swarm@echo-universe.dev"
          git config user.name "Echo Swarm"
          git add .echo/state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "swarm: packet received [${{ github.event.client_payload.seq }}]"
          git push origin HEAD 2>/dev/null || true

      - name: Echo receipt
        run: |
          echo "∇θ — packet absorbed, chain sealed"
          echo "Repo: ${{ github.repository }}"
          echo "Time: $(date -u)"

name: CI
# Nathan Poinsette | 0x4E415448414E504F494E5345545445
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Nathan Poinsette identity
        run: |
          python3 -c "
          import os, sys
          EXPECTED = '0x4E415448414E504F494E5345545445'
          found = any(
              EXPECTED in open(os.path.join(r, f), errors='ignore').read()
              for r, _, fs in os.walk('.')
              for f in fs
              if f.endswith(('.py', '.ps1', '.sh', '.md', '.yml'))
          )
          print('Identity check: PASS' if found else 'Identity check: WARN (not found)')
          sys.exit(0)
          "

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --quiet
          pip install pytest pytest-cov --quiet
          if [ -f requirements.txt ]; then pip install -r requirements.txt --quiet; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short || true
          else
            echo "No tests directory found — skipping"
          fi

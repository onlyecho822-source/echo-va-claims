name: nabla-theta Identity Enforcement

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  enforce-identity:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check signatures
        run: python .github/scripts/check_headers.py
        continue-on-error: true
        id: check

      - name: Auto-inject missing signatures
        if: steps.check.outcome == 'failure'
        run: |
          python .github/scripts/heal_headers.py

      - name: Commit healed signatures
        if: steps.check.outcome == 'failure'
        run: |
          git config user.email "ci@echo-universe.dev"
          git config user.name "Echo Identity Bot"
          git add -A
          git diff --cached --quiet || git commit -m "fix: auto-inject nabla-theta identity signatures"
          git push origin HEAD 2>/dev/null || true

      - name: Final check
        run: python .github/scripts/check_headers.py
